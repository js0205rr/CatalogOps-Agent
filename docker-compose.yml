services:
  api:
    build:
      context: .
      dockerfile: docs/docker/Dockerfile.api
      args:
        BASE_IMAGE_REGISTRY: ${BASE_IMAGE_REGISTRY:-docker.1ms.run/library/}
    env_file:
      - .env
    environment:
      CORS_ORIGINS: "http://localhost,http://127.0.0.1,http://localhost:8080,http://127.0.0.1:8080"
      CATALOGOPS_MOCK_LLM: "true"
    expose:
      - "8000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docs/docker/Dockerfile.web
      args:
        BASE_IMAGE_REGISTRY: ${BASE_IMAGE_REGISTRY:-docker.1ms.run/library/}
        VITE_API_BASE: ""
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

